name: Release Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2 sdl2_image

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libgtk-3-dev

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}\installed
          key: vcpkg-x64-windows-sdl2-sdl2_image

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install sdl2:x64-windows sdl2-image:x64-windows

      # -----------------------------------------------------------------------
      # Cache CMake FetchContent downloads (ImGui, nfd, nlohmann/json)
      # -----------------------------------------------------------------------
      - name: Cache CMake FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      # -----------------------------------------------------------------------
      # Configure
      # -----------------------------------------------------------------------
      - name: Configure (macOS / Linux)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      # -----------------------------------------------------------------------
      # Build
      # -----------------------------------------------------------------------
      - name: Build
        run: cmake --build build --config Release --parallel

      # -----------------------------------------------------------------------
      # Package
      # -----------------------------------------------------------------------
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: zip -r the-8-bit-machine-macOS.zip build/the-8-bit-machine.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir dist
          cp build/the-8-bit-machine dist/
          [ -d build/presets ] && cp -r build/presets dist/
          [ -d build/assets ]  && cp -r build/assets  dist/
          zip -r the-8-bit-machine-Linux.zip dist/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null

          # exe location varies between single/multi-config generators
          $exe = Get-ChildItem -Recurse build -Filter the-8-bit-machine.exe |
                   Select-Object -First 1
          Copy-Item $exe.FullName dist/

          # resources (CMake copies these next to the exe at build time)
          foreach ($res in @("presets", "assets")) {
            $dir = Get-ChildItem -Recurse build -Directory -Filter $res |
                     Select-Object -First 1
            if ($dir) { Copy-Item -Recurse $dir.FullName dist/ }
          }

          # SDL2 + SDL2_image runtime DLLs from vcpkg
          Get-ChildItem "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin" `
            -Filter "*.dll" | Copy-Item -Destination dist/

          Compress-Archive -Path dist\* -DestinationPath the-8-bit-machine-Windows.zip

      # -----------------------------------------------------------------------
      # Upload
      # -----------------------------------------------------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: the-8-bit-machine-${{ matrix.name }}
          path: the-8-bit-machine-${{ matrix.name }}.zip
