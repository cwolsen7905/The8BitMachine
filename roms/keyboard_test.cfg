# test.cfg  —  ld65 linker configuration for The 8-Bit Machine test ROM
#
# Produces a flat binary starting at $0200.
# The build script prepends a 2-byte PRG load-address header ($00 $02)
# to produce roms/test.prg.

MEMORY {
    # Zero page — not written to the output file (variables only)
    ZP:   start = $0002, size = $00FE, type = rw, file = "";

    # Main program area starting at $0200
    RAM:  start = $0200, size = $EC00, type = rw, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp;
    CODE:     load = RAM, type = ro;
    RODATA:   load = RAM, type = ro;
    DATA:     load = RAM, type = rw;
    BSS:      load = RAM, type = bss, optional = yes;
}
