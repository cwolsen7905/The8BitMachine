# sid_playground.cfg  —  ld65 linker configuration for The 8-Bit Machine
#
# Produces a flat binary starting at $0200.
# The build script prepends a 2-byte PRG load-address header ($00 $02)
# to produce roms/sid_playground.prg.

MEMORY {
    # Zero page — not written to the output file (variables only)
    ZP:   start = $0000, size = $0100, type = rw, file = "";

    # Main program area starting at $0800 (above screen RAM $0400-$07E7)
    RAM:  start = $0800, size = $E800, type = rw, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp;
    CODE:     load = RAM, type = ro;
    RODATA:   load = RAM, type = ro;
    DATA:     load = RAM, type = rw;
    BSS:      load = RAM, type = bss, optional = yes;
}
